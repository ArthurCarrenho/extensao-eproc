<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <style>
        ___baseStyles___
    </style>
    <style>
        /* Duplicate Layout - Structured Content View */
        .single-content h3 {
            color: var(--color-primary);
            font-size: var(--font-size-xl);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 3px solid var(--color-primary);
        }

        /* Details Table - Key/Value pairs */
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-lg) 0;
            background: var(--color-bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .details-table td {
            padding: var(--space-sm) var(--space-md);
            border-bottom: 1px solid var(--color-border);
            vertical-align: top;
        }

        .details-table tr:last-child td {
            border-bottom: none;
        }

        .details-table .detail-key {
            font-weight: 600;
            color: var(--color-text-muted);
            white-space: nowrap;
            width: 35%;
            background: var(--color-bg-subtle);
            border-right: 2px solid var(--color-primary);
        }

        .details-table .detail-value {
            color: var(--color-text);
            word-break: break-word;
        }

        .details-table tr:hover {
            background-color: var(--color-primary-light);
        }

        .details-table tr:hover .detail-key {
            background-color: var(--color-primary-light);
        }

        /* Description fallback when no key-value pairs */
        .description {
            color: var(--color-text);
            font-size: var(--font-size-base);
            line-height: 1.8;
            padding: var(--space-md);
            background: var(--color-bg-subtle);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-primary);
            margin: var(--space-lg) 0;
        }
    </style>
</head>

<body>
    <div class="single-content">
        <div class="header-section">
            <h3>___mainTitle___</h3>
            ___dataHora___
            ___detailsTable___
            ___description___
            ___lawyersTable___
        </div>
    </div>
</body>

</html>
