<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <style>
        ___baseStyles___
    </style>
    <style>
        /* Standard Layout Overrides */
        .header-section {
            border-radius: 0;
        }

        /* Header Metadata - Inline style, flows naturally */
        .header-meta {
            margin-top: var(--space-md);
            padding-top: var(--space-md);
            border-top: 1px solid var(--color-border);
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
            line-height: 1.8;
        }

        .header-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs) var(--space-md);
            margin-bottom: var(--space-xs);
        }

        .header-meta-item {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .header-meta-item .label {
            color: var(--color-text-light);
        }

        .header-meta-item .value {
            color: var(--color-text);
        }

        .header-meta-item .value.user-name {
            font-weight: 500;
            color: var(--color-primary-dark);
        }

        /* Status badge - subtle */
        .status-badge {
            font-size: 0.8em;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.fechado {
            color: #155724;
            background: rgba(40, 167, 69, 0.15);
        }

        .status-badge.aberto {
            color: #721c24;
            background: rgba(220, 53, 69, 0.15);
        }

        /* Details Table */
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-lg) 0;
            background: var(--color-bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .details-table td {
            padding: var(--space-sm) var(--space-md);
            border-bottom: 1px solid var(--color-border);
            vertical-align: top;
        }

        .details-table tr:last-child td {
            border-bottom: none;
        }

        .details-table .detail-key {
            font-weight: 600;
            color: var(--color-text-muted);
            white-space: nowrap;
            width: 30%;
            background: var(--color-bg-subtle);
            border-right: 2px solid var(--color-primary);
        }

        .details-table .detail-value {
            color: var(--color-text);
            word-break: break-word;
        }

        .details-table tr:hover {
            background-color: var(--color-primary-light);
        }

        .details-table tr:hover .detail-key {
            background-color: var(--color-primary-light);
        }
    </style>
</head>

<body>
    <div class="header-section">
        <h2>___headerTitle___</h2>
        ___subtitle___
        <div class="meta">___dataHora___</div>
        ___headerMeta___
    </div>
    <div class="content-section">
        ___detailsTable___
        <div class="content-body">___bodyContent___</div>
        ___lawyersTable___
    </div>
</body>

</html>
